<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🐺 Ma Sói — Client thử (WebSocket)</title>
<style>
  :root{--bg:#0f0a1e;--surface:#1a1230;--surface2:#251a40;--border:#3b2d5e;--text:#ede9fe;--muted:#9d8fc7;--accent:#a855f7;--red:#f87171;--green:#4ade80;--gold:#fbbf24;}
  *{box-sizing:border-box;} body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;}
  main{max-width:560px;margin:0 auto;padding:14px;display:flex;flex-direction:column;gap:12px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;}
  .title{font-weight:700;margin-bottom:8px;}
  input,button{font-size:.95rem;border-radius:9px;border:1px solid var(--border);}
  input{background:var(--surface2);color:var(--text);padding:9px 11px;width:100%;}
  .num{width:64px;display:inline-block;}
  button{background:var(--accent);color:#fff;border:none;padding:9px 14px;font-weight:700;cursor:pointer;}
  button.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  button.sel{background:#3b1a6e;border:1px solid var(--accent);}
  button:disabled{opacity:.4;}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
  .muted{color:var(--muted);font-size:.85rem;} .hidden{display:none!important;}
  .chip{padding:4px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);font-size:.85rem;}
  .chip.dead{opacity:.45;text-decoration:line-through;}
  #log{white-space:pre-line;line-height:1.6;font-size:.9rem;max-height:240px;overflow:auto;}
  .big{font-size:2.4rem;text-align:center;}
  .pill{padding:2px 10px;border-radius:20px;font-size:.75rem;background:var(--surface2);border:1px solid var(--border);}
</style>
</head>
<body>
<main>
  <div class="card">
    <div class="title">🐺 Ma Sói — client thử (WebSocket)</div>
    <div class="muted" id="conn">Chưa kết nối</div>
    <div class="row" style="margin-top:8px" id="joinRow">
      <input id="wsUrl" value="ws://localhost:8080" style="flex:1 1 200px">
      <input id="room" placeholder="Mã phòng" value="TEST" style="width:110px">
      <input id="name" placeholder="Tên" style="width:120px">
      <button onclick="doJoin()">Vào phòng</button>
    </div>
    <div class="row" id="statusRow" style="margin-top:8px">
      <span class="pill" id="phasePill">—</span>
      <span class="muted" id="aliveInfo"></span>
      <span class="muted" id="phaseTimer" style="color:var(--gold)"></span>
      <button class="ghost" style="margin-left:auto;padding:5px 10px" onclick="leave()">Rời phòng</button>
    </div>
  </div>

  <div class="card hidden" id="roleCard">
    <div class="title">🃏 Vai của bạn</div>
    <div id="roleBody" class="muted">Chờ chia bài…</div>
  </div>

  <div class="card" id="lobbyCard">
    <div class="title">🚪 Phòng chờ</div>
    <div class="row" id="lobbyPlayers"></div>
    <div style="margin-top:10px" class="muted">Cấu hình vai (tổng phải bằng số người). Dân tự tính.</div>
    <div class="row" style="margin-top:6px">
      🐺<input class="num" id="c_wolf" type="number" min="0" value="1">
      🔮<input class="num" id="c_seer" type="number" min="0" value="1">
      🧙<input class="num" id="c_witch" type="number" min="0" value="0">
      🛡️<input class="num" id="c_bodyguard" type="number" min="0" value="0">
      🧑 Dân: <b id="villagerCount">–</b>
    </div>
    <button style="margin-top:10px" onclick="doStart()">🚀 Bắt đầu (server tự dẫn ván)</button>
  </div>

  <div class="card hidden" id="promptCard">
    <div class="title" id="promptTitle">Tới lượt bạn</div>
    <div class="muted" id="promptTimer"></div>
    <div id="promptBody" style="margin-top:8px"></div>
    <div class="row" style="margin-top:10px">
      <button id="confirmBtn" onclick="sendPick()">✔️ Xác nhận</button>
      <button class="ghost" onclick="sendSkip()">⏭️ Bỏ lượt</button>
    </div>
  </div>

  <div class="card hidden" id="sleepCard"><div class="big">🌙</div><div class="muted" style="text-align:center">Đang ngủ… chờ tới lượt.</div></div>

  <div class="card hidden" id="voteCard">
    <div class="title">🪢 Bỏ phiếu treo <span id="voteTimer" style="color:var(--gold);font-weight:400;font-size:.85rem"></span></div>
    <div class="grid" id="voteGrid"></div>
    <div class="muted" id="voteTally" style="margin-top:8px"></div>
  </div>

  <div class="card hidden" id="overCard">
    <div class="big" id="overIcon">🏁</div>
    <div class="title" id="overTitle" style="text-align:center"></div>
    <div id="overReveal" class="muted"></div>
  </div>

  <div class="card hidden" id="chatCard">
    <div class="title">💬 Chat</div>
    <div class="row" id="chatTabs" style="margin-bottom:6px"></div>
    <div id="chatMsgs" style="max-height:180px;overflow:auto;font-size:.9rem;line-height:1.6;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px">—</div>
    <div class="row" style="margin-top:6px">
      <input id="chatIn" placeholder="Nhắn tin…" style="flex:1" onkeydown="if(event.key==='Enter')sendChat()">
      <button onclick="sendChat()">Gửi</button>
    </div>
  </div>

  <div class="card">
    <div class="title">📜 Diễn biến</div>
    <div id="log" class="muted">—</div>
  </div>

  <div class="card">
    <div class="title" style="font-size:.85rem">👥 Người chơi</div>
    <div class="row" id="players"></div>
  </div>
</main>

<script>
'use strict';
const $ = id => document.getElementById(id);
const show = (id,on) => $(id).classList.toggle('hidden',!on);
let ws=null, myId=null, myTeam=null, myAlive=true, players=[], phase='lobby', curPrompt=null, sel=[], witchSel={heal:null,poison:null}, tInt=null, myVote=null, voteOptions=[];
let chatBuf={main:[],wolf:[],dead:[]}, chatCh='main';

function logLine(s){ const el=$('log'); el.textContent = (el.textContent==='—'?'':el.textContent+'\n') + s; el.scrollTop=el.scrollHeight; }
function send(o){ if(ws&&ws.readyState===1) ws.send(JSON.stringify(o)); }
function esc(s){ return String(s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }

/* ── Đếm ngược dùng chung ── */
const cds={}; const cdEl={prompt:'promptTimer',vote:'voteTimer',day:'phaseTimer'};
function countdown(key, deadline, prefix){
  clearInterval(cds[key]); const el=$(cdEl[key]); if(!el||!deadline) return;
  const upd=()=>{ const s=Math.max(0,Math.ceil((deadline-Date.now())/1000)); el.textContent=prefix+' '+s+'s'; if(s<=0){ clearInterval(cds[key]); el.textContent=''; } };
  upd(); cds[key]=setInterval(upd,500);
}
function clearCd(key){ clearInterval(cds[key]); const el=$(cdEl[key]); if(el) el.textContent=''; }

function connect(mode){
  const url=$('wsUrl').value.trim(), room=$('room').value.trim(), name=$('name').value.trim()||'Ẩn danh';
  ws = new WebSocket(url);
  $('conn').textContent='Đang kết nối…';
  ws.onopen = ()=>{
    $('conn').textContent='Đã kết nối ✓'; $('joinRow').style.opacity=.5;
    if(mode==='resume') send({t:'resume', room, token:localStorage.getItem('masoi_token')});
    else send({t:'join', room, name});
    localStorage.setItem('masoi_room', room); localStorage.setItem('masoi_name', name);
  };
  ws.onclose= ()=>{ $('conn').textContent='Mất kết nối (thử tải lại trang để vào lại)'; };
  ws.onerror= ()=>{ $('conn').textContent='Lỗi kết nối (server đã chạy chưa?)'; };
  ws.onmessage = e => handle(JSON.parse(e.data));
}
function doJoin(){ connect('join'); }
function leave(){ try{ ws && ws.close(); }catch(e){} localStorage.removeItem('masoi_token'); location.reload(); }
window.addEventListener('load', ()=>{
  const t=localStorage.getItem('masoi_token'), r=localStorage.getItem('masoi_room');
  if(t && r){ $('room').value=r; $('name').value=localStorage.getItem('masoi_name')||''; connect('resume'); }
});

function updVillager(){
  const total=players.length;
  const others=['wolf','seer','witch','bodyguard'].reduce((s,k)=>s+(+$('c_'+k).value||0),0);
  $('villagerCount').textContent = Math.max(0,total-others);
}
function doStart(){
  const counts={};
  ['wolf','seer','witch','bodyguard'].forEach(k=>{ const v=+$('c_'+k).value||0; if(v>0) counts[k]=v; });
  const villager = players.length - Object.values(counts).reduce((a,b)=>a+b,0);
  if(villager>0) counts.villager=villager;
  send({t:'start', counts});
}

function handle(m){
  switch(m.t){
    case 'welcome': myId=m.id; if(m.token) localStorage.setItem('masoi_token', m.token); break;
    case 'lobby': players=m.players; renderPlayers(); updVillager(); show('chatCard',true); updateChatTabs(); break;
    case 'yourRole':
      myTeam=m.role.team;
      show('roleCard',true);
      $('roleBody').innerHTML = `${m.role.icon||''} <b style="color:var(--gold)">${m.role.name}</b> <span class="pill">${teamVi(m.role.team)}</span>`
        + (m.mates&&m.mates.length?`<div class="muted" style="margin-top:6px">Đồng đội: ${m.mates.map(x=>x.name).join(', ')}</div>`:'');
      show('chatCard',true); updateChatTabs();
      break;
    case 'state':
      phase=m.phase; players=m.players; renderPlayers();
      { const meP=players.find(p=>p.id===myId); myAlive = meP ? meP.alive!==false : true; }
      updateChatTabs();
      $('phasePill').textContent = {lobby:'🚪 Lobby',night:'🌙 Đêm '+m.nightNo,day:'☀️ Ngày '+m.dayNo,ended:'🏁 Kết thúc'}[m.phase]||m.phase;
      $('aliveInfo').textContent = m.aliveCount!=null?`${m.aliveCount} người còn sống`:'';
      show('lobbyCard', m.phase==='lobby');
      if(m.phase!=='night'){ show('promptCard',false); show('sleepCard',false); clearCd('prompt'); }
      if(m.phase!=='day'){ show('voteCard',false); clearCd('vote'); clearCd('day'); }
      break;
    case 'chatMsg': (chatBuf[m.channel] ||= []).push({from:m.from,text:m.text}); if(m.channel===chatCh) renderChat(); break;
    case 'scene':
      logLine(m.phase==='night'?`🌙 — Đêm ${m.nightNo} —`:`☀️ — Ngày ${m.dayNo} —`);
      if(m.phase==='day' && m.deadline) countdown('day', m.deadline, '🗣️ Mở vote sau'); else clearCd('day');
      break;
    case 'prompt': curPrompt=m; sel=[]; witchSel={heal:null,poison:null}; show('sleepCard',false); renderPrompt(); break;
    case 'sleep': curPrompt=null; show('promptCard',false); show('sleepCard',true); clearCd('prompt'); break;
    case 'privateResult': logLine('🔒 '+m.text); break;
    case 'morning': curPrompt=null; show('promptCard',false); show('sleepCard',false); clearCd('prompt'); logLine('🌅 '+m.lines.join('\n')); break;
    case 'voteOpen': renderVote(m); break;
    case 'voteTally': $('voteTally').textContent = 'Phiếu: '+Object.entries(m.tally).map(([i,c])=>`${nameOf(players[i]&&players[i].id)||('#'+i)}:${c}`).join('  ·  '); break;
    case 'day': show('voteCard',false); logLine('⚖️ '+m.lines.join('\n')); break;
    case 'gameOver': renderOver(m); break;
    case 'error':
      logLine('⚠️ '+m.message);
      if(/Phiên không còn/.test(m.message)){ localStorage.removeItem('masoi_token'); $('joinRow').style.opacity=1; $('conn').textContent='Phiên cũ hết hạn — hãy Vào phòng lại.'; }
      else if(curPrompt){ show('promptCard',true); show('sleepCard',false); renderPrompt(); }  // cho làm lại
      break;
  }
}

/* ── Chat ── */
const CH_VI = { main:'💬 Chung', wolf:'🐺 Sói', dead:'👻 Âm phủ' };
function updateChatTabs(){
  const tabs=['main'];
  if(myTeam==='wolf') tabs.push('wolf');
  if(myAlive===false) tabs.push('dead');
  if(!tabs.includes(chatCh)) chatCh='main';
  $('chatTabs').innerHTML = tabs.map(c=>`<button class="ghost ${c===chatCh?'sel':''}" onclick="setChatCh('${c}')">${CH_VI[c]}</button>`).join('');
  renderChat();
}
function setChatCh(c){ chatCh=c; updateChatTabs(); }
function renderChat(){
  const arr=chatBuf[chatCh]||[];
  $('chatMsgs').innerHTML = arr.map(m=>`<div><b style="color:var(--accent)">${esc(m.from)}:</b> ${esc(m.text)}</div>`).join('') || '<span class="muted">Chưa có tin nhắn.</span>';
  $('chatMsgs').scrollTop=$('chatMsgs').scrollHeight;
}
function sendChat(){ const t=$('chatIn').value.trim(); if(!t) return; send({t:'chat', channel:chatCh, text:t}); $('chatIn').value=''; }
const teamVi = t => ({wolf:'🐺 Phe Sói',village:'🏡 Phe Dân',third:'🎭 Phe Thứ Ba'}[t]||t);
const nameOf = id => { const p=players.find(x=>x.id===id); return p?p.name:''; };

function renderPlayers(){
  $('players').innerHTML = players.map(p=>`<span class="chip ${p.alive===false?'dead':''}">${p.id===myId?'⭐':''}${p.name}</span>`).join('');
  $('lobbyPlayers').innerHTML = players.map(p=>`<span class="chip">${p.id===myId?'⭐':''}${p.name}</span>`).join('');
}

function renderPrompt(){
  const p=curPrompt; show('promptCard',true);
  $('promptTitle').textContent = '🌙 Tới lượt: '+stepVi(p.stepType);
  countdown('prompt', p.deadline, '⏱️ còn');
  const opts=(p.options||[]).filter(o=>o.id!==myId||p.stepType==='witch'); // ẩn chính mình cho vai nhắm người khác (witch có thể tự cứu)
  if(p.mode==='witch'){
    const vic = 'Bạn không biết Sói cắn ai. Chọn cứu / độc, hoặc bỏ qua. Mỗi bình 1 lần cả ván.';
    const heal = p.healUsed
      ? '<div class="muted">💊 Bình cứu đã dùng hết.</div>'
      : `<div class="muted">💊 Cứu (chọn 1 hoặc bỏ):</div><div class="grid">`+
        p.options.map(o=>`<button class="ghost" data-h="${o.id}" onclick="pickWitch('heal','${o.id}')">${esc(o.name)}</button>`).join('')+`</div>`;
    const poison = p.poisonUsed
      ? '<div class="muted" style="margin-top:8px">☠️ Bình độc đã dùng hết.</div>'
      : `<div class="muted" style="margin-top:8px">☠️ Độc (chọn 1 hoặc bỏ):</div><div class="grid">`+
        p.options.map(o=>`<button class="ghost" data-p="${o.id}" onclick="pickWitch('poison','${o.id}')">${esc(o.name)}</button>`).join('')+`</div>`;
    $('promptBody').innerHTML = `<div class="muted" style="margin-bottom:6px">${vic}</div>`+heal+poison;
  } else {
    $('promptBody').innerHTML = `<div class="grid">`+
      opts.map(o=>`<button class="ghost" data-id="${o.id}" onclick="togglePick('${o.id}')">${o.name}</button>`).join('')+`</div>`;
  }
}
function togglePick(id){
  const i=sel.indexOf(id); if(i>=0) sel.splice(i,1); else sel.push(id);
  document.querySelectorAll('#promptBody button[data-id]').forEach(b=>b.classList.toggle('sel', sel.includes(b.dataset.id)));
}
function pickWitch(kind,id){
  witchSel[kind] = witchSel[kind]===id ? null : id;
  document.querySelectorAll(`#promptBody button[data-${kind==='heal'?'h':'p'}]`).forEach(b=>{
    const key=kind==='heal'?'h':'p'; b.classList.toggle('sel', b.dataset[key]===witchSel[kind]);
  });
}
function sendPick(){
  if(!curPrompt) return;
  if(curPrompt.mode==='witch') send({t:'action', action:{heal:witchSel.heal, poison:witchSel.poison}});
  else send({t:'action', action:{targets:sel}});
  show('promptCard',false); show('sleepCard',true); clearInterval(tInt);
}
function sendSkip(){ send({t:'action', action:{skip:true}}); show('promptCard',false); show('sleepCard',true); clearInterval(tInt); }

function renderVote(m){
  show('voteCard',true); voteOptions=m.options||[]; myVote=null; drawVote();
  $('voteTally').textContent='Chưa có phiếu.';
  clearCd('day'); countdown('vote', m.deadline, '⏱️ Còn');
}
function drawVote(){
  $('voteGrid').innerHTML=voteOptions.map(o=>`<button class="ghost ${myVote===o.id?'sel':''}" onclick="castVote('${o.id}')">${esc(o.name)}</button>`).join('');
}
function castVote(id){ myVote=id; send({t:'vote', target:id}); drawVote(); }

function renderOver(m){
  show('overCard',true); show('promptCard',false); show('sleepCard',false); show('voteCard',false);
  const W={village:['🏆','PHE DÂN THẮNG!'],wolf:['🐺','PHE SÓI THẮNG!'],third:['🎭','PHE THỨ BA THẮNG!']};
  const w=W[m.winner]||['🏁','KẾT THÚC'];
  $('overIcon').textContent=w[0]; $('overTitle').textContent=w[1];
  $('overReveal').innerHTML=(m.reveal||[]).map(r=>`${r.name} — ${r.role}${r.alive?'':' 💀'}`).join('<br>');
}
const stepVi = t => ({wolf:'Ma Sói cắn',seer:'Tiên Tri soi',witch:'Phù Thủy',bodyguard:'Bảo Vệ',doctor:'Bác Sĩ',hunter:'Thợ Săn',cupid:'Cupid',whitewolf:'Sói Trắng',serialkiller:'Sát Nhân'}[t]||t);

['c_wolf','c_seer','c_witch','c_bodyguard'].forEach(id=>document.addEventListener('input',e=>{ if(e.target.id===id) updVillager(); }));
</script>
</body>
</html>
